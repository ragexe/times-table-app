<div class="flex flex-col items-center justify-center min-h-screen p-4 bg-blue-50">
  <!-- Top Bar -->
  <div class="w-full max-w-md flex justify-between items-center mb-8">
    <button
      routerLink="/"
      class="px-4 py-2 bg-white text-gray-600 rounded-xl shadow hover:bg-gray-100 transition-all font-bold"
    >
      ← В меню
    </button>
    <div class="flex text-2xl font-black text-purple-600">
      <img
        data-v-8d3c2763=""
        class="app-modal-icon__icon-image"
        srcset="
          https://img.icons8.com/?size=30&amp;id=NtzbCdpz2pEm&amp;format=png 1x,
          https://img.icons8.com/?size=60&amp;id=NtzbCdpz2pEm&amp;format=png 2x
        "
        alt="Robux"
        width="30"
        height="30"
      />
      {{ statsService.totalScore() }}
    </div>
  </div>

  <!-- Progress Bar Container -->
  <div class="w-full max-w-md h-4 bg-gray-200 rounded-full mb-4 overflow-hidden shadow-inner">
    <div
      class="h-full transition-all ease-linear duration-75"
      [style.width.%]="progressWidth()"
      [class.bg-green-400]="progressWidth() > 50"
      [class.bg-yellow-400]="progressWidth() <= 50 && progressWidth() > 20"
      [class.bg-red-500]="progressWidth() <= 20"
    ></div>
  </div>

  <!-- Game Card -->
  <div
    class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 border-8 border-yellow-400 text-center"
  >
    <!-- Hint / Message -->
    <div class="h-8 text-lg font-bold text-gray-400 mb-4 transition-all">
      {{ message() }}
    </div>

    <!-- Equation -->
    <div class="text-7xl font-black text-blue-600 mb-10 tracking-tight">
      {{ numberLeft() }}
      <span
        [class.text-red-500]="activeOperation() === 'multiplication'"
        [class.text-purple-500]="activeOperation() === 'division'"
      >
        {{ activeOperation() === 'multiplication' ? '×' : '÷' }}
      </span>
      {{ numberRight() }}
    </div>

    <!-- Answer Grid -->
    <div class="grid grid-cols-2 gap-4">
      @for (opt of options(); track opt) {
        <button
          (click)="handleAnswer(opt)"
          [disabled]="wrongAnswers().includes(opt) || isAnswered()"
          [class.opacity-40]="
            wrongAnswers().includes(opt) || (isAnswered() && !correctAnswers().includes(opt))
          "
          [class.grayscale]="
            wrongAnswers().includes(opt) || (isAnswered() && !correctAnswers().includes(opt))
          "
          class="py-6 text-3xl font-bold rounded-2xl transition-all border-b-8 bg-orange-100 text-orange-600 border-orange-200 enabled:hover:bg-orange-400 enabled:hover:text-white disabled:cursor-default"
        >
          {{ opt }}
        </button>
      }
    </div>

    <!-- "Next" Button - Only visible when answered correctly -->
    <div class="mt-10 h-20">
      @if (isAnswered()) {
        <button
          (click)="nextQuestion()"
          class="w-full py-4 text-2xl font-black bg-green-500 text-white rounded-2xl shadow-lg hover:bg-green-600 animate-bounce transition-all border-b-8 border-green-700"
        >
          СЛЕДУЮЩИЙ ➔
        </button>
      }
    </div>
  </div>

  <!-- Footer Info -->
  <div class="mt-8 text-gray-400 font-medium">
    @if (table() === 'random') {
      Режим: Вразнобой
    } @else {
      Учим таблицу на {{ table() }}
    }
  </div>
</div>
