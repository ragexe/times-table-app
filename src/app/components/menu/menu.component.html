<div class="flex flex-col items-center justify-center min-h-screen p-4">
  @if (!statsService.isLoggedIn()) {
    <div class="flex flex-col gap-4">
      <input
        #nameInput
        (input)="(0)"
        type="text"
        placeholder="Как тебя зовут?"
        class="p-4 rounded-xl border-2 border-blue-400 outline-none text-2xl"
        (keyup.enter)="statsService.setUserName(nameInput.value)"
      />

      <button
        [disabled]="!nameInput.value.trim()"
        (click)="statsService.setUserName(nameInput.value)"
        class="bg-blue-500 disabled:bg-gray-300 text-white p-4 rounded-xl font-bold"
      >
        Начать заниматься!
      </button>
    </div>
  } @else {
    <!-- Game mode -->
    <div class="flex justify-center mb-8 w-full max-w-sm mx-auto">
      <div
        class="flex flex-wrap sm:flex-nowrap p-1.5 bg-white border-4 border-blue-200 rounded-3xl shadow-inner w-full justify-center gap-1"
      >
        <!-- Multiplication -->
        <button
          (click)="setOperation('multiplication')"
          [class.bg-blue-500]="currentOperation() === 'multiplication'"
          [class.text-white]="currentOperation() === 'multiplication'"
          class="flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-2xl transition-all duration-300 font-black text-lg sm:text-2xl min-w-[140px]"
        >
          <span class="text-2xl">×</span>
          <span>Умножение</span>
        </button>

        <!-- Division -->
        <button
          (click)="setOperation('division')"
          [class.bg-purple-500]="currentOperation() === 'division'"
          [class.text-white]="currentOperation() === 'division'"
          class="flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-2xl transition-all duration-300 font-black text-lg sm:text-2xl min-w-[140px]"
        >
          <span class="text-2xl">÷</span>
          <span>Деление</span>
        </button>
      </div>
    </div>

    <!-- User Section -->
    <div class="text-center w-full max-w-2xl">
      <div
        class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-10 bg-white p-6 rounded-3xl shadow-sm border-2 border-blue-50"
      >
        <!-- User Info & Score -->
        <div class="flex flex-col items-start">
          <span class="text-lg font-medium text-gray-500">
            Привет, <b class="text-blue-600">{{ statsService.userName() }}</b
            >! 👋
          </span>
          <!-- Тот самый score -->
          <div class="flex items-center gap-2 mt-1">
            ⭐
            <span class="text-2xl font-black text-yellow-500">
              {{ statsService.totalScore() }}
            </span>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col items-end gap-2">
          <button
            (click)="statsService.logout()"
            class="text-sm text-red-300 hover:text-red-500 transition-colors underline"
          >
            Это не я
          </button>
        </div>
      </div>
    </div>

    <h1 class="text-4xl font-bold text-blue-600 mb-10 text-center">Таблица умножения</h1>

    <!-- Tables grid -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-6">
      @for (num of tables; track num) {
        <button
          [routerLink]="['/game', currentOperation(), num]"
          [class.bg-blue-400]="currentOperation() === 'multiplication'"
          [class.bg-purple-400]="currentOperation() === 'division'"
          class="w-24 h-24 text-4xl font-black rounded-3xl text-white shadow-xl hover:scale-110 transition-transform border-b-8 border-black/20 active:border-b-0"
        >
          {{ num }}
        </button>
      }
    </div>

    <button
      [routerLink]="['/challenge', currentOperation(), 'random']"
      class="mt-12 px-10 py-5 text-2xl font-bold bg-green-500 text-white rounded-2xl shadow-lg hover:bg-green-600 transition-all"
    >
      🎲 Вразнобой
    </button>
  }
</div>
